; ═══════════════════════════════════════════
; PHP Configuration — Production
; ═══════════════════════════════════════════

; ── Limits ──
memory_limit = 256M
max_execution_time = 300
max_input_time = 300
post_max_size = 64M
upload_max_filesize = 256M
max_input_vars = 10000
max_file_uploads = 20

; ── Security ──
expose_php = Off
display_errors = Off
display_startup_errors = Off
log_errors = On
error_reporting = E_ALL & ~E_DEPRECATED & ~E_STRICT
error_log = /proc/self/fd/2

; ── Sessions ──
session.cookie_httponly = 1
session.cookie_secure = 1
session.use_strict_mode = 1
session.cookie_samesite = Lax

; ── OPcache ──
opcache.enable = 1
opcache.enable_cli = 0
opcache.memory_consumption = 256
opcache.interned_strings_buffer = 32
opcache.max_accelerated_files = 20000
opcache.max_wasted_percentage = 5
opcache.use_cwd = 1
; ── Авто-подхват деплоя (issue #1, root-cause fix B) ──
; РАНЬШЕ: validate_timestamps=0 → PHP никогда не сверял mtime, и после
; прод-деплоя плагина (wp-admin ZIP) php-fpm бесконечно отдавал СТАРЫЙ
; байткод, пока кэш не сбросят вручную (reload/recreate/wp-cli). Именно
; ручные форс-обходы давали историч. spawn-loop. Контролируемо доказано:
; голый `docker kill -s USR2 wordpress` безопасен; storm от самого USR2
; нет. Стоимость revalidate при 1k UV/сут ничтожна (1 fstat/файл раз в 2с),
; а профиль производительности — единственный довод за «0» — на этом
; трафике несущественен.
; ТЕПЕРЬ: PHP сам замечает изменённые файлы и инкрементально докомпилирует
; в течение revalidate_freq — деплой подхватывается за ~2с автоматически,
; без ручного шага и без mass-restart (→ структурно не может быть лупа).
; file_update_protection=2: не кэшировать файл, изменённый <2с назад —
; защита от компиляции полу-распакованного файла во время WP_Upgrader.
opcache.validate_timestamps = 1
opcache.revalidate_freq = 2
opcache.save_comments = 1
opcache.enable_file_override = 1
opcache.file_update_protection = 2
opcache.huge_code_pages = 0
opcache.jit = disable
opcache.jit_buffer_size = 0

; ── Realpath Cache ──
realpath_cache_size = 4096k
realpath_cache_ttl = 600

; ── cURL ──
curl.cainfo = /etc/ssl/certs/ca-certificates.crt

; ── Mail (msmtp) ──
sendmail_path = "/usr/bin/msmtp -t"

; ── Misc ──
default_socket_timeout = 30
date.timezone = UTC
