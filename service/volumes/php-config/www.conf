; ═══════════════════════════════════════════
; PHP-FPM Pool — Production
; Target: 1000 UV/day, peak 50-100 concurrent.
; Stress-test 2026-05-02:
;   8 → 20 children: убрал FPM-очередь, но при 100 VU node_load1=14
;        на 4 ядрах = CPU-saturation, regression на cached/auth.
;   20 → 16: компромисс (~4 worker per CPU при насыщении).
; ═══════════════════════════════════════════

[www]

; ── User / Group ──
; Базовый www.conf образа удалён в Dockerfile (он дублировал [www] и
; ломал graceful USR2-reload спавн-лупом). Поэтому user/group теперь
; ОБЯЗАНЫ быть здесь: master php-fpm под root, без них пул не стартует.
user = www-data
group = www-data

listen = 0.0.0.0:9000

; ── Process Manager ──
pm = dynamic
pm.max_children = 16
pm.start_servers = 4
pm.min_spare_servers = 3
pm.max_spare_servers = 8
pm.max_requests = 500

; ── Status & Monitoring ──
pm.status_path = /fpm-status
pm.status_listen = 0.0.0.0:9001

; ── Slow Log — ОТКЛЮЧАЕМ ──
; В production-режиме slowlog не нужен, он только создаёт нагрузку
; и вызывает ошибки ptrace в контейнерах
;slowlog = /var/log/php-fpm-slow.log
;request_slowlog_timeout = 0

; ── Таймауты ──
request_terminate_timeout = 120s

; ── Environment ──
clear_env = no

; ── Limits ──
rlimit_files = 8192
rlimit_core = 0

; ── Error logging ──
php_admin_flag[log_errors] = on
php_admin_value[error_log] = /proc/self/fd/2

; ── Security ──
; curl_multi_exec нужен WP HTTP API (Requests::request_multiple);
; parse_ini_file — plugin/translation loaders. Их запрет ломал админку:
; WP откатывался на PHP-streams без Happy Eyeballs → 30s таймаут на AAAA.
php_admin_value[disable_functions] = exec,passthru,shell_exec,system,proc_open,popen,show_source,pcntl_exec