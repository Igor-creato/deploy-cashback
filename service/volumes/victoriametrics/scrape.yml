global:
  # Реже опрос — для 1k req/day метрики каждые 30s излишни.
  # 60s даёт 2× меньше точек при той же видимости трендов.
  scrape_interval: 60s
  scrape_timeout: 10s

scrape_configs:
  - job_name: node
    static_configs:
      - targets: ['node-exporter:9100']

  - job_name: cadvisor
    static_configs:
      - targets: ['cadvisor:8080']
    metric_relabel_configs:
      - action: labeldrop
        regex: 'container_label_traefik.*|container_label_org_opencontainers.*|container_label_maintainer'
      # Дроп контейнеров pause/k8s, если когда-то появятся
      - source_labels: [container_label_io_kubernetes_container_name]
        action: drop
        regex: '.+'

  - job_name: victoriametrics
    static_configs:
      - targets: ['victoriametrics:8428']

  - job_name: mysqld
    static_configs:
      - targets: ['mysqld-exporter:9104']

  # ── УБРАНЫ: redis-exporter, php-fpm-exporter (выкл. в compose) ──
  # - job_name: redis
  # - job_name: php-fpm

  # webhook-worker экспортирует custom-метрики (DLQ size, processed count)
  - job_name: webhook-worker
    static_configs:
      - targets: ['webhook-worker:9100']
