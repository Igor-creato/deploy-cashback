networks:
  proxy:
    external: true
  internal:
    driver: bridge
  db-shared:
    external: true

# ─────────────────────────────────────────────────────────────
# x-anchor: единый logging — json-file, 10m × 3 (≤30 МБ/сервис)
# Применяется ко ВСЕМ сервисам через <<: *default-logging.
# Снижает риск переполнения /var/lib/docker/containers/*-json.log
# на одном VPS при пиковой нагрузке.
# ─────────────────────────────────────────────────────────────
x-default-logging: &default-logging
  driver: json-file
  options:
    max-size: '10m'
    max-file: '3'

services:
  # ═══════════════════════════════════════════
  # Docker Socket Proxy
  # ═══════════════════════════════════════════
  docker-socket-proxy:
    # F-S1-004: pinned by digest. Tag immutability protection — обновлять
    # через `docker pull <tag>` затем заменить digest здесь.
    image: tecnativa/docker-socket-proxy:v0.4.2@sha256:1f3a6f303320723d199d2316a3e82b2e2685d86c275d5e3deeaf182573b47476
    container_name: docker-socket-proxy
    restart: always
    mem_limit: 64m
    mem_reservation: 16m
    environment:
      CONTAINERS: 1
      NETWORKS: 1
      SERVICES: 0
      TASKS: 0
      INFO: 1
      POST: 0
      BUILD: 0
      COMMIT: 0
      CONFIGS: 0
      DISTRIBUTION: 0
      EXEC: 0
      IMAGES: 0
      NODES: 0
      PLUGINS: 0
      SECRETS: 0
      SWARM: 0
      SYSTEM: 0
      VOLUMES: 0
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - proxy
    logging: *default-logging

  # ═══════════════════════════════════════════
  # Traefik
  # ── ИЗМЕНЕНИЯ: accessLog отключён по умолчанию (ENABLE_TRAEFIK_ACCESSLOG=1
  #    в .env вернёт его). При выключенном accessLog volume traefik_logs
  #    не наполняется — нет I/O. Healthchecks/error.log идут в stdout.
  # ═══════════════════════════════════════════
  traefik:
    image: traefik:v3.6.14@sha256:4cda3393930dceff030e144b46260e96e1337c9cfaa4fed81c90cb8f4d498f57
    container_name: traefik
    restart: always
    mem_limit: 256m
    mem_reservation: 64m
    depends_on:
      docker-socket-proxy:
        condition: service_started
    ports:
      - '80:80'
      - '443:443'
    environment:
      DOCKER_HOST: tcp://docker-socket-proxy:2375
    volumes:
      - ./volumes/traefik/traefik.yml:/etc/traefik/traefik.yml:ro
      - ./volumes/traefik/config.yml:/etc/traefik/config.yml:ro
      - ./volumes/traefik/acme.json:/acme.json
      # traefik_logs смонтирован только если accessLog в traefik.yml активен.
      # При отключении в traefik.yml файл не создаётся — диск чист.
      - traefik_logs:/var/log/traefik
    command:
      - '--configFile=/etc/traefik/traefik.yml'
    networks:
      - proxy
    healthcheck:
      test: ['CMD-SHELL', 'wget -q --spider http://127.0.0.1:8082/ping || exit 1']
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    logging: *default-logging

  # ═══════════════════════════════════════════
  # MariaDB
  # ── Рекомендация: в ./volumes/mariadb/conf.d/optimize.cnf добавить
  #    skip-log-bin (репликации нет) и slow_query_log=0. Это убирает
  #    binlog write на каждый INSERT/UPDATE — крупная экономия I/O.
  # ═══════════════════════════════════════════
  mariadb:
    image: mariadb:11.8@sha256:78a5047d3ba33975f183f183c2464cc7f1eab13ec8667e57cc9a5821d6da7577
    container_name: mariadb
    restart: always
    mem_limit: 1536m
    mem_reservation: 512m
    networks:
      - internal
      - db-shared
    ports:
      - '127.0.0.1:33306:3306'
    environment:
      TZ: UTC
      MARIADB_AUTO_UPGRADE: '1'
      MYSQL_ROOT_PASSWORD_FILE: /run/secrets/db_root_password
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD_FILE: /run/secrets/db_password
    secrets:
      - db_root_password
      - db_password
    volumes:
      - ./volumes/mariadb/data:/var/lib/mysql
      - ./volumes/mariadb/conf.d:/etc/mysql/conf.d:ro
      - ./volumes/mariadb/initdb.d:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ['CMD', 'healthcheck.sh', '--connect', '--innodb_initialized']
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    logging: *default-logging

  # ═══════════════════════════════════════════
  # Redis
  # ── Без изменений по командам (AOF + everysec корректно для финданных).
  # ═══════════════════════════════════════════
  redis:
    image: redis:8.6.2-alpine@sha256:c5e375abb885e6b2021c0377879e4890bf76f9065b8922ffc113f2b226b9fc17
    container_name: redis
    restart: always
    mem_limit: 320m
    mem_reservation: 128m
    networks:
      - internal
      - db-shared
    command: >
      redis-server
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --save ""
      --appendonly yes
      --appendfsync everysec
      --auto-aof-rewrite-percentage 100
      --auto-aof-rewrite-min-size 64mb
      --tcp-keepalive 60
      --timeout 300
      --hz 10
      --lfu-log-factor 10
      --activedefrag yes
      --loglevel warning
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s
    logging: *default-logging

  # ═══════════════════════════════════════════
  # WordPress + PHP-FPM
  # ═══════════════════════════════════════════
  wordpress:
    build: .
    image: wordpress-custom:php8.4-fpm
    container_name: wordpress
    restart: always
    mem_limit: 1536m
    mem_reservation: 512m
    depends_on:
      mariadb:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - internal
    environment:
      WORDPRESS_DB_HOST: mariadb:3306
      WORDPRESS_DB_NAME: ${MYSQL_DATABASE}
      WORDPRESS_DB_USER: ${MYSQL_USER}
      WORDPRESS_DB_PASSWORD_FILE: /run/secrets/db_password
      # WP_DEBUG_ENABLE=0 в production обязательно — иначе debug.log пухнет
      WP_DEBUG_ENABLE: "${WP_DEBUG_ENABLE:-0}"
      WORDPRESS_CONFIG_EXTRA: |
        define('WP_MEMORY_LIMIT', '256M');
        define('WP_MAX_MEMORY_LIMIT', '512M');
        define('FORCE_SSL_ADMIN', true);
        if (isset($$_SERVER['HTTP_X_FORWARDED_PROTO']) && strpos($$_SERVER['HTTP_X_FORWARDED_PROTO'], 'https') !== false) {
          $$_SERVER['HTTPS'] = 'on';
        }
        define('WP_REDIS_HOST', 'redis');
        define('WP_REDIS_PORT', 6379);
        define('WP_REDIS_DATABASE', 0);
        define('WP_REDIS_TIMEOUT', 1);
        define('WP_REDIS_READ_TIMEOUT', 1);
        define('DISALLOW_FILE_EDIT', true);
        define('WP_AUTO_UPDATE_CORE', 'minor');
        define('WP_POST_REVISIONS', 5);
        define('EMPTY_TRASH_DAYS', 7);
        define('WP_CRON_LOCK_TIMEOUT', 120);
        define('DISABLE_WP_CRON', true);
        define('CONCATENATE_SCRIPTS', false);
        define('WP_CACHE', true);
        if (getenv('WP_DEBUG_ENABLE') === '1') {
          @ini_set('error_log', '/var/www/html/wp-content/debug.log');
          @ini_set('log_errors', '1');
          @ini_set('display_errors', '0');
          define('WP_DEBUG_DISPLAY', false);
        }
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASSWORD_FILE: /run/secrets/smtp_password
      SMTP_SECURE: ${SMTP_SECURE:-tls}
      SMTP_FROM: ${SMTP_FROM}
      # cash-back fastcgi_cache purger: WP-контейнер удаляет файлы кэша при
      # изменении товаров. Cache key/levels должны совпадать с nginx default.conf.
      CASHBACK_NGINX_CACHE_PATH: /var/cache/nginx/fastcgi
      CASHBACK_NGINX_CACHE_KEY_FORMAT: '$$scheme$$request_method$$host$$request_uri'
      CASHBACK_NGINX_CACHE_LEVELS: '1:2'
    secrets:
      - db_password
      - smtp_password
    volumes:
      - ./volumes/wordpress:/var/www/html
      - ./volumes/php-config/wordpress.ini:/usr/local/etc/php/conf.d/wordpress.ini:ro
      - ./volumes/php-config/www.conf:/usr/local/etc/php-fpm.d/zz-www.conf:ro
      - nginx_cache:/var/cache/nginx
    healthcheck:
      test: ['CMD-SHELL', 'php-fpm-healthcheck || kill -0 1']
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 180s
    logging: *default-logging

  # ═══════════════════════════════════════════
  # ModSecurity
  # ── ИЗМЕНЕНИЯ: audit log пишется в stdout (Serial → fd:2),
  #    а не в файл — забирается json-file драйвером с ротацией 10m×3.
  #    При нагрузке ≤1000 хуков/сутки + RelevantOnly + статус-фильтр это даёт
  #    ~1–5 МБ логов/сутки с гарантированной ротацией.
  # ═══════════════════════════════════════════
  modsecurity:
    image: owasp/modsecurity-crs:4.25.0-nginx-alpine-202604040104@sha256:f7ebbff3739ad03cff3062537543129598f94ab304ed19b895e20ddf14e1e1da
    container_name: modsecurity
    restart: always
    mem_limit: 384m
    mem_reservation: 96m
    networks:
      - proxy
      - internal
    depends_on:
      nginx:
        condition: service_healthy
    environment:
      - BACKEND=http://nginx:80
      - PARANOIA=${MODSEC_PARANOIA:-1}
      - ANOMALY_INBOUND=5
      - ANOMALY_OUTBOUND=4
      - MODSEC_RULE_ENGINE=${MODSEC_RULE_ENGINE:-DetectionOnly}
      - ALLOWED_METHODS=GET HEAD POST OPTIONS PUT PATCH DELETE
      - MAX_FILE_SIZE=67108864
      # ── Audit: только релевантные события + 5xx и аномальные 4xx ──
      - MODSEC_AUDIT_ENGINE=RelevantOnly
      - MODSEC_AUDIT_LOG_TYPE=Serial
      # stdout вместо файла — попадает в Docker json-file с ротацией
      - MODSEC_AUDIT_LOG=/proc/self/fd/2
      - MODSEC_AUDIT_LOG_FORMAT=JSON
      - MODSEC_AUDIT_LOG_RELEVANT_STATUS=^(?:5|4(?!04|03))
      - MODSEC_INCLUDE=/etc/modsecurity.d/local-rules/*.conf
      # error_log nginx внутри контейнера — только warn+
      - ERRORLOG_LEVEL=warn
    volumes:
      # local-rules только READ-ONLY — audit log больше НЕ маунтится на диск
      - ./volumes/modsecurity/local-rules:/etc/modsecurity.d/local-rules:ro
    labels:
      - traefik.enable=true
      - traefik.docker.network=proxy
      - traefik.http.services.modsec-svc.loadbalancer.server.port=8080
      - traefik.http.routers.wordpress-main.entrypoints=websecure
      - traefik.http.routers.wordpress-main.rule=Host(`${DOMAIN}`)
      - traefik.http.routers.wordpress-main.tls=true
      - traefik.http.routers.wordpress-main.tls.certresolver=letsencrypt
      - traefik.http.routers.wordpress-main.priority=10
      - traefik.http.routers.wordpress-main.service=modsec-svc
      - traefik.http.routers.wordpress-main.middlewares=ratelimit,wp-headers
      - traefik.http.routers.wordpress-admin.entrypoints=websecure
      - 'traefik.http.routers.wordpress-admin.rule=Host(`${DOMAIN}`) && PathPrefix(`/wp-admin`)'
      - traefik.http.routers.wordpress-admin.tls=true
      - traefik.http.routers.wordpress-admin.tls.certresolver=letsencrypt
      - traefik.http.routers.wordpress-admin.priority=100
      - traefik.http.routers.wordpress-admin.service=modsec-svc
      - traefik.http.routers.wordpress-admin.middlewares=wp-headers
      - traefik.http.routers.wordpress-login.entrypoints=websecure
      - 'traefik.http.routers.wordpress-login.rule=Host(`${DOMAIN}`) && Path(`/wp-login.php`)'
      - traefik.http.routers.wordpress-login.tls=true
      - traefik.http.routers.wordpress-login.tls.certresolver=letsencrypt
      - traefik.http.routers.wordpress-login.priority=200
      - traefik.http.routers.wordpress-login.service=modsec-svc
      - traefik.http.routers.wordpress-login.middlewares=wp-bruteforce,wp-headers
      - traefik.http.middlewares.ratelimit.ratelimit.average=500
      - traefik.http.middlewares.ratelimit.ratelimit.burst=2000
      - traefik.http.middlewares.ratelimit.ratelimit.period=1s
      - traefik.http.middlewares.ratelimit.ratelimit.sourcecriterion.ipstrategy.depth=1
      - traefik.http.middlewares.wp-bruteforce.ratelimit.average=30
      - traefik.http.middlewares.wp-bruteforce.ratelimit.burst=100
      - traefik.http.middlewares.wp-bruteforce.ratelimit.period=1s
      - traefik.http.middlewares.wp-bruteforce.ratelimit.sourcecriterion.ipstrategy.depth=1
      - traefik.http.middlewares.wp-headers.headers.customResponseHeaders.X-Frame-Options=SAMEORIGIN
      - traefik.http.middlewares.wp-headers.headers.customResponseHeaders.X-Content-Type-Options=nosniff
      - traefik.http.middlewares.wp-headers.headers.customResponseHeaders.Referrer-Policy=strict-origin-when-cross-origin
      - traefik.http.middlewares.wp-headers.headers.customResponseHeaders.Permissions-Policy=camera=(), microphone=(), geolocation=()
      - traefik.http.middlewares.wp-headers.headers.stsSeconds=31536000
      - traefik.http.middlewares.wp-headers.headers.stsIncludeSubdomains=true
      - traefik.http.middlewares.wp-headers.headers.stsPreload=true
    healthcheck:
      test: ['CMD-SHELL', 'wget -q -O /dev/null http://127.0.0.1:8080/nginx-health || exit 1']
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    logging: *default-logging

  # ═══════════════════════════════════════════
  # Nginx
  # ── ИЗМЕНЕНИЯ:
  #    - access.log → /dev/null (см. nginx.conf.optimized);
  #      диагностика 4xx/5xx остаётся в Traefik accessLog (если включён)
  #      и в modsec audit log в stdout.
  #    - error.log → stderr (Docker json-file драйвер с ротацией).
  #    - Volume nginx-logs больше НЕ нужен (удалён из volumes).
  # ═══════════════════════════════════════════
  nginx:
    image: nginx:1.28.2-alpine@sha256:5b4900b042ccfa8b0a73df622c3a60f2322faeb2be800cbee5aa7b44d241649e
    container_name: nginx
    restart: always
    mem_limit: 256m
    mem_reservation: 64m
    # UID/GID 33:33 = www-data в WP-контейнере. Унификация нужна, чтобы WP мог
    # удалять файлы из nginx_cache (fastcgi_cache_purge от cash-back плагина).
    user: "33:33"
    networks:
      - internal
    depends_on:
      wordpress:
        condition: service_healthy
    volumes:
      - ./volumes/wordpress:/var/www/html:ro
      - ./volumes/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./volumes/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - nginx_cache:/var/cache/nginx
    healthcheck:
      test: ['CMD-SHELL', 'wget -q -O /dev/null http://127.0.0.1/nginx-health || exit 1']
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    logging: *default-logging

  # ═══════════════════════════════════════════
  # node-exporter — host metrics, обязательно для алертов диск/RAM
  # ═══════════════════════════════════════════
  node-exporter:
    image: prom/node-exporter:v1.11.1@sha256:e9cff4fc67b1818f8c97adb115b9f12c9a54b533de86765d4a0effc01b357205
    container_name: node-exporter
    restart: unless-stopped
    mem_limit: 128m
    mem_reservation: 32m
    pid: host
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
      - /var/lib/node_exporter/textfile_collector:/host/textfile:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - '--path.rootfs=/rootfs'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
      - '--collector.textfile.directory=/host/textfile'
      # Снимаем ненужные коллекторы — меньше CPU/IO
      - '--no-collector.arp'
      - '--no-collector.bcache'
      - '--no-collector.bonding'
      - '--no-collector.btrfs'
      - '--no-collector.fibrechannel'
      - '--no-collector.infiniband'
      - '--no-collector.ipvs'
      - '--no-collector.nfs'
      - '--no-collector.nvme'
      - '--no-collector.tapestats'
      - '--no-collector.zfs'
    networks:
      - internal
    logging: *default-logging

  # ═══════════════════════════════════════════
  # cAdvisor
  # ── housekeeping 60s/120s — реже опрос, меньше CPU.
  #    Остальные метрики уже отключены оригинальным конфигом.
  # ═══════════════════════════════════════════
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.55.1@sha256:3de2bd5203120b866d74a9b283b2ffb8ec382fbf9dc321814700c6ea6f44ec57
    container_name: cadvisor
    restart: unless-stopped
    mem_limit: 512m
    mem_reservation: 192m
    command:
      - '--docker_only=true'
      - '--housekeeping_interval=60s'
      - '--max_housekeeping_interval=120s'
      - '--disable_metrics=disk,diskIO,tcp,udp,sched,process,hugetlb,referenced_memory,network,cpuLoad,cpu_topology,resctrl'
      - '--event_storage_event_limit=default=0'
      - '--event_storage_age_limit=default=0'
      - '--store_container_labels=false'
      - '--whitelisted_container_labels=com.docker.compose.project,com.docker.compose.service'
    depends_on:
      modsecurity:
        condition: service_healthy
    environment:
      - DOCKER_API_VERSION=1.44
    # F-S1-003: unprivileged. `privileged: true` снимало все capability-ограничения
    # → host-RCE при CVE в cAdvisor. Минимально необходимый набор:
    #   SYS_PTRACE — process introspection cgroups
    #   DAC_READ_SEARCH — чтение root-owned /var/lib/docker файлов
    #   SYSLOG — чтение /dev/kmsg для OOM events
    # Все volumes остаются :ro (без write attack surface).
    # containerd.sock тоже :ro — но он необходим, modern Docker (Docker 19.03+)
    # использует containerd как backend, и cAdvisor дотягивается до runtime
    # API именно через containerd.sock; docker.sock сам по себе недостаточен.
    cap_drop:
      - ALL
    cap_add:
      - SYS_PTRACE
      - DAC_READ_SEARCH
      - SYSLOG
    security_opt:
      - no-new-privileges:true
    devices:
      - /dev/kmsg
    volumes:
      - /:/rootfs:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /run/containerd/containerd.sock:/run/containerd/containerd.sock:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    networks:
      - internal
    logging: *default-logging

  # ═══════════════════════════════════════════
  # mysqld-exporter — оставлен (slow query / connections важны)
  # ═══════════════════════════════════════════
  mysqld-exporter:
    image: prom/mysqld-exporter:v0.19.0@sha256:eacb4b18e2ec1e0abdf2d64851b68526c964f6d9cb3e9458fb5d5f5062ea94c1
    container_name: mysqld-exporter
    restart: unless-stopped
    mem_limit: 64m
    mem_reservation: 16m
    command:
      - '--config.my-cnf=/run/secrets/mysql_exporter_my_cnf'
      - '--mysqld.address=mariadb:3306'
      - '--collect.global_status'
      - '--collect.global_variables'
      # processlist/innodb_metrics убраны — для 1k req/day избыточны
    secrets:
      - mysql_exporter_my_cnf
    networks:
      - internal
    depends_on:
      mariadb:
        condition: service_healthy
    logging: *default-logging

  # ═══════════════════════════════════════════
  # УДАЛЕНО: redis-exporter
  # ── Для 1000 хуков/сутки метрики redis не дают actionable insights.
  #    DLQ size можно смотреть через `redis-cli LLEN webhook:dlq` cron'ом
  #    или алерт worker_dlq_size из webhook-worker:9100.
  # ═══════════════════════════════════════════

  # ═══════════════════════════════════════════
  # УДАЛЕНО: php-fpm-exporter
  # ── pm.max_children=8 — saturation видно в response time через
  #    Traefik/nginx logs. При росте нагрузки вернуть.
  # ═══════════════════════════════════════════

  # ═══════════════════════════════════════════
  # VictoriaMetrics
  # ── retention 30d → 7d (≈4× меньше storage).
  #    Дополнительно: --search.maxLookback ограничивает RAM.
  # ═══════════════════════════════════════════
  victoriametrics:
    image: victoriametrics/victoria-metrics:v1.140.0@sha256:5ea06e3a567249f8a23181208755f36dabd3b515f7023e9eb570fd4ae6c29203
    container_name: victoriametrics
    restart: unless-stopped
    mem_limit: 768m
    mem_reservation: 192m
    command:
      - '--storageDataPath=/storage'
      - '--retentionPeriod=7d'
      - '--promscrape.config=/etc/victoriametrics/scrape.yml'
      - '--httpListenAddr=:8428'
      # Фоновый merge реже — меньше I/O
      - '--storage.minFreeDiskSpaceBytes=536870912'
      - '--memory.allowedPercent=40'
    volumes:
      - vm_data:/storage
      - ./volumes/victoriametrics/scrape.yml:/etc/victoriametrics/scrape.yml:ro
    networks:
      - internal
      - db-shared
    depends_on:
      - node-exporter
      - cadvisor
    logging: *default-logging

  # ═══════════════════════════════════════════
  # УДАЛЕНО: victorialogs
  # ── Парный к vector. На 1k запросов/сутки централизованный лог-store
  #    избыточен. `docker logs <container>` + journald + logrotate решают.
  # ═══════════════════════════════════════════

  # ═══════════════════════════════════════════
  # УДАЛЕНО: vector
  # ── Главный источник постоянного disk I/O (tail 4 файла + parse + ship).
  #    Логи nginx error / traefik / modsec audit теперь идут в stdout
  #    Docker json-file драйвера → автоматическая ротация 10m×3.
  # ═══════════════════════════════════════════

  # ═══════════════════════════════════════════
  # Grafana
  # ── Убран victoriametrics-logs-datasource (VictoriaLogs больше нет).
  # ═══════════════════════════════════════════
  grafana:
    image: grafana/grafana:12.4.1@sha256:e932bd6ed0e026595b08483cd0141e5103e1ab7ff8604839ff899b8dc54cabcb
    container_name: grafana
    restart: unless-stopped
    # PID 1 в grafana/grafana — это `grafana server` (Go-бинарь), который не
    # reap'ит SIGCHLD у orphan-процессов. HEALTHCHECK через CMD-SHELL+wget
    # периодически оставляет osiротевшие wget'ы, и они копятся как zombies
    # (см. obsidian/knowledge/debugging/dockerd-cpu-spike-investigation.md).
    # `init: true` запускает docker-init (tini) как PID 1 — он корректно
    # делает wait() на детях.
    init: true
    mem_limit: 384m
    mem_reservation: 128m
    ports:
      - '127.0.0.1:3000:3000'
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD__FILE: /run/secrets/grafana_admin_password
      GF_USERS_ALLOW_SIGN_UP: 'false'
      GF_AUTH_ANONYMOUS_ENABLED: 'false'
      GF_SERVER_ROOT_URL: http://localhost:3000
      GF_LOG_LEVEL: warn
      GF_LOG_MODE: console
      GF_ANALYTICS_REPORTING_ENABLED: 'false'
      GF_ANALYTICS_CHECK_FOR_UPDATES: 'false'
      GF_SMTP_ENABLED: 'true'
      GF_SMTP_HOST: ${SMTP_HOST}:${SMTP_PORT:-587}
      GF_SMTP_USER: ${SMTP_USER}
      GF_SMTP_PASSWORD__FILE: /run/secrets/smtp_password
      GF_SMTP_FROM_ADDRESS: ${SMTP_FROM}
      GF_SMTP_FROM_NAME: 'Grafana Monitor'
      GF_SMTP_STARTTLS_POLICY: 'MandatoryStartTLS'
    secrets:
      - grafana_admin_password
      - smtp_password
    volumes:
      - grafana_data:/var/lib/grafana
      - ./volumes/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./volumes/grafana/dashboards:/var/lib/grafana/dashboards:ro
    networks:
      - internal
    healthcheck:
      test: ['CMD-SHELL', 'wget -q --spider http://127.0.0.1:3000/api/health || exit 1']
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    logging: *default-logging

  # ═══════════════════════════════════════════
  # ОТКЛЮЧЕНО: crowdsec
  # ── В DetectionOnly без bouncer — это лог-парсер, который не блокирует
  #    атаки, но постоянно читает все 4 лога и пишет в SQLite (data/crowdsec.db).
  #    Включать ТОЛЬКО когда добавишь crowdsec-traefik-bouncer
  #    и переключишь в Active mode.
  #
  # Чтобы временно вернуть: убери комментарии, проверь что
  # ./volumes/nginx-logs и ./volumes/modsec-logs существуют, и скорми
  # crowdsec stdout-логи nginx/modsec через source: type: docker (alternative).
  # ═══════════════════════════════════════════
  # crowdsec:
  #   image: crowdsecurity/crowdsec:v1.7.7
  #   container_name: crowdsec
  #   restart: always
  #   mem_limit: 256m
  #   mem_reservation: 96m
  #   networks:
  #     - internal
  #   environment:
  #     TZ: UTC
  #     COLLECTIONS: >-
  #       crowdsecurity/linux
  #       crowdsecurity/traefik
  #       crowdsecurity/base-http-scenarios
  #     USE_WAL: 'true'
  #   volumes:
  #     - crowdsec_config:/etc/crowdsec
  #     - crowdsec_data:/var/lib/crowdsec/data
  #     - ./volumes/crowdsec/acquis.yaml:/etc/crowdsec/acquis.yaml:ro
  #     - traefik_logs:/var/log/traefik:ro
  #   healthcheck:
  #     test: ['CMD', 'cscli', 'lapi', 'status']
  #     interval: 30s
  #     timeout: 5s
  #     retries: 3
  #     start_period: 60s
  #   logging: *default-logging

# ═══════════════════════════════════════════
# Volumes
# ── Удалены: vlogs_data (VictoriaLogs), crowdsec_config/data (выкл.).
#    nginx-logs больше не bind-маунт — nginx пишет в stdout.
#    traefik_logs остаётся для случая включения accessLog.
# ═══════════════════════════════════════════
volumes:
  nginx_cache:
    driver: local
    driver_opts:
      type: tmpfs
      device: tmpfs
      # uid/gid=33 = www-data; см. user: "33:33" у nginx и mount у wordpress.
      o: size=512m,uid=33,gid=33,mode=0755
  traefik_logs:
    driver: local
  redis_data:
    driver: local
  vm_data:
  grafana_data:
  # crowdsec_config:
  # crowdsec_data:

secrets:
  db_root_password:
    file: ./secrets/db_root_password.txt
  db_password:
    file: ./secrets/db_password.txt
  smtp_password:
    file: ./secrets/smtp_password.txt
  grafana_admin_password:
    file: ./secrets/grafana_admin_password.txt
  mysql_exporter_my_cnf:
    file: ./secrets/mysql_exporter.cnf
